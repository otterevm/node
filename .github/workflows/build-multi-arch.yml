name: Build Multi-Architecture Binaries and Docker Images

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v1.0.0)

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: linux
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
          - target: x86_64-apple-darwin
            os: darwin
            arch: amd64
          - target: aarch64-apple-darwin
            os: darwin
            arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          if [[ "${{ matrix.os }}" == "linux" ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              sudo apt-get install -y gcc-aarch64-linux-gnu
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            fi
          elif [[ "${{ matrix.os }}" == "darwin" ]]; then
            rustup target add ${{ matrix.target }}
          fi
      
      - name: Build binary
        run: |
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cargo build --target ${{ matrix.target }} --release --locked
          else
            cargo build --target ${{ matrix.target }} --release --locked
          fi
      
      - name: Rename binary for release
        run: |
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            mv target/${{ matrix.target }}/release/otterevm.exe target/${{ matrix.target }}/release/otterevm-${{ matrix.os }}-${{ matrix.arch }}.exe
          else
            mv target/${{ matrix.target }}/release/otterevm target/${{ matrix.target }}/release/otterevm-${{ matrix.os }}-${{ matrix.arch }}
          fi
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: otterevm-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/otterevm-${{ matrix.os }}-${{ matrix.arch }}*

  build-docker-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: otterevm/otterevm
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./binaries -type f -executable -exec cp {} ./release-assets/ \;
          chmod +x ./release-assets/*
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ./release-assets/*