name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Build Binaries for Multiple Platforms
  # ==========================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: otter
            artifact_name: otter-linux-arm64
          # Linux x64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: otter
            artifact_name: otter-linux-x64
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            binary: otter
            artifact_name: otter-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies (Linux only)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        run: |
          cargo build --release --bin otter --target ${{ matrix.target }} --features "asm-keccak,jemalloc,otlp"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 30

  # ==========================================
  # Build and Push Docker Images
  # ==========================================
  docker-build:
    name: Build Docker Image ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            docker_arch: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            docker_arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.docker_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/bake-action@v5
        env:
          TAG_VERSION: ${{ github.ref_name }}
        with:
          push: true
          targets: otter
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.platform=${{ matrix.platform }}
            otter.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_VERSION }}

  # ==========================================
  # Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-binaries, docker-build]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release binaries
        run: |
          cd artifacts
          mkdir -p release
          # Rename and compress binaries
          for dir in otter-*/; do
            platform=$(basename "$dir")
            binary=$(find "$dir" -type f | head -n 1)
            if [[ "$platform" == *"windows"* ]]; then
              zip "release/${platform}.zip" "$binary"
            else
              cp "$binary" "release/${platform}"
              chmod +x "release/${platform}"
              tar czf "release/${platform}.tar.gz" -C "$dir" .
            fi
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
