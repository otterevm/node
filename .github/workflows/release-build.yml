name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Build Binaries for Multiple Platforms
  # ==========================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: otterevm
            artifact_name: otterevm-linux-arm64
          # Linux x64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: otterevm
            artifact_name: otterevm-linux-x64
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            binary: otterevm
            artifact_name: otterevm-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies (Linux only)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        run: |
          cargo build --release --bin otterevm --target ${{ matrix.target }} --features "asm-keccak,jemalloc,otlp"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 30

  # ==========================================
  # Build and Push Docker Images
  # ==========================================
  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-24.04
    needs: build-binaries
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-linux-arm64
          path: binaries/arm64

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-linux-x64
          path: binaries/amd64

      - name: Verify downloaded binaries
        run: |
          echo "=== ARM64 binary ==="
          ls -lh binaries/arm64/
          file binaries/arm64/otterevm || echo "File not found or not executable"

          echo "=== AMD64 binary ==="
          ls -lh binaries/amd64/
          file binaries/amd64/otterevm || echo "File not found or not executable"

      - name: Prepare multi-arch build context
        run: |
          mkdir -p docker-context/amd64 docker-context/arm64
          cp binaries/amd64/otterevm docker-context/amd64/otterevm
          cp binaries/arm64/otterevm docker-context/arm64/otterevm
          echo "=== Build context ==="
          ls -lh docker-context/amd64/ docker-context/arm64/

      - name: Write Dockerfiles
        run: |
          # Create Dockerfile for amd64
          cat > docker-context/Dockerfile.amd64 << 'EOF'
          FROM debian:trixie-slim

          RUN apt-get update && apt-get install -y --no-install-recommends \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /data

          COPY amd64/otterevm /usr/local/bin/otterevm
          RUN chmod +x /usr/local/bin/otterevm

          ENTRYPOINT ["/usr/local/bin/otterevm"]
          EOF

          # Create Dockerfile for arm64
          cat > docker-context/Dockerfile.arm64 << 'EOF'
          FROM debian:trixie-slim

          RUN apt-get update && apt-get install -y --no-install-recommends \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /data

          COPY arm64/otterevm /usr/local/bin/otterevm
          RUN chmod +x /usr/local/bin/otterevm

          ENTRYPOINT ["/usr/local/bin/otterevm"]
          EOF

          echo "=== Dockerfile.amd64 ==="
          cat docker-context/Dockerfile.amd64
          echo ""
          echo "=== Dockerfile.arm64 ==="
          cat docker-context/Dockerfile.arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for amd64
        uses: docker/build-push-action@v6
        with:
          context: ./docker-context
          file: ./docker-context/Dockerfile.amd64
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image for arm64
        uses: docker/build-push-action@v6
        with:
          context: ./docker-context
          file: ./docker-context/Dockerfile.arm64
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push manifest list
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64

  # ==========================================
  # Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-binaries, docker-build]
    permissions:
      contents: write

    steps:
      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-linux-arm64
          path: artifacts/otterevm-linux-arm64

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-linux-x64
          path: artifacts/otterevm-linux-x64

      - name: Download macOS ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-macos-arm64
          path: artifacts/otterevm-macos-arm64

      - name: Prepare release binaries
        run: |
          cd artifacts
          mkdir -p release
          # Rename and compress binaries
          for dir in otterevm-*/; do
            platform=$(basename "$dir")
            binary=$(find "$dir" -type f | head -n 1)
            if [[ "$platform" == *"windows"* ]]; then
              zip "release/${platform}.zip" "$binary"
            else
              cp "$binary" "release/${platform}"
              chmod +x "release/${platform}"
              tar czf "release/${platform}.tar.gz" -C "$dir" .
            fi
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
