name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g., 1.5.4-beta1)"
        required: true
        type: string
      profile:
        description: "Build profile"
        default: "profiling"
        type: choice
        options:
          - "release"
          - "profiling"
          - "maxperf"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary-amd64:
    name: Build Binary (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build otterevm binary
        run: |
          cargo build --bin otterevm \
            --features "asm-keccak,jemalloc,otlp" \
            --profile ${{ inputs.profile }} \
            --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          PROFILE_DIR="${{ inputs.profile }}"
          if [ "$PROFILE_DIR" = "dev" ]; then
            PROFILE_DIR="debug"
          fi
          mkdir -p out
          cp target/x86_64-unknown-linux-gnu/${PROFILE_DIR}/otterevm out/otterevm-amd64
          ls -lh out/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: otterevm-amd64
          path: out/otterevm-amd64

  build-binary-arm64:
    name: Build Binary (linux/arm64)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          brew install FiloSottile/musl-cross/musl-cross || true
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu || true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build otterevm binary (cross-compile)
        run: |
          cargo build --bin otterevm \
            --features "asm-keccak,otlp" \
            --profile ${{ inputs.profile }} \
            --target aarch64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          PROFILE_DIR="${{ inputs.profile }}"
          if [ "$PROFILE_DIR" = "dev" ]; then
            PROFILE_DIR="debug"
          fi
          mkdir -p out
          cp target/aarch64-unknown-linux-gnu/${PROFILE_DIR}/otterevm out/otterevm-arm64
          ls -lh out/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: otterevm-arm64
          path: out/otterevm-arm64

  build-and-push-docker:
    name: Build and Push Docker Image
    needs: [build-binary-amd64, build-binary-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-amd64
          path: docker-context/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: otterevm-arm64
          path: docker-context/arm64

      - name: Make binaries executable
        run: |
          chmod +x docker-context/amd64/otterevm-amd64
          chmod +x docker-context/arm64/otterevm-arm64

      - name: Write Dockerfile
        run: |
          cat > docker-context/Dockerfile << 'EOF'
          ARG TARGETARCH
          FROM debian:bookworm-slim

          RUN apt-get update && apt-get install -y --no-install-recommends \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /data

          COPY ${TARGETARCH}/otterevm-${TARGETARCH} /usr/local/bin/otterevm
          RUN chmod +x /usr/local/bin/otterevm

          ENTRYPOINT ["/usr/local/bin/otterevm"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker-context
          file: ./docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "✅ Pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
